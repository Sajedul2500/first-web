<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex layout</title>
    <style>
        div{
            font-size: 2rem;
        }
        .user-container{
            display: flex;
            gap: 20px;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .user{
            border: 2px red solid;
        }
        .container{
            display: flex;
            /*flex-direction: column;
            flex-direction: column-reverse;
            flex-direction: row-reverse;
            justify-content: center;
            justify-content: left;
            justify-content: right;
            justify-content: space-between;
            justify-content: space-around;*/
        }
        .box{
            border: 2px blue dotted;
            height: 50px;
            font-size: 2rem;
        }

        .pic-container{
            display: flex;
            border: 2px greenyellow solid;
            justify-content: center;
            align-items: center;
            height: 500px;
        }
        .pic{
            border: 2px purple solid;
            height: 100px;
            width: 200px;
        }
    </style>
</head>
<body>
    <!-- emmits -->
    <!-- div>p -->
    <!-- div>article>section>h2 -->
    <!-- div>article*3>section>h2 -->
    <!-- div>article*3>section>h2+p*3 -->

    <!-- ul.container>li.item*5{item-$} -->
    <!-- .container>.box*5{box-$} -->
    <!-- .user-container>.user*5{user-$} -->

    <div class="container">
        <div class="box">box-1</div>
        <div class="box">box-2</div>
        <div class="box">box-3</div>
        <div class="box">box-4</div>
        <div class="box">box-5</div>
    </div>

    <div class="user-container">
        <div class="user">user-1</div>
        <div class="user">user-2</div>
        <div class="user">user-3</div>
        <div class="user">user-4</div>
        <div class="user">user-5</div>
    </div>

    <div class="pic-container">
        <div class="pic">picture-1</div>
    </div>
</body>
</html>
